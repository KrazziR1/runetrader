<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ── Primary meta ── -->
    <title>RuneTrader.gg — OSRS GE Flip Tracker</title>
    <meta name="description" content="Find the best OSRS Grand Exchange flips with live prices, AI advisor, and portfolio tracking." />
    <meta name="theme-color" content="#c9a84c" />

    <!-- ── PWA manifest ── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png?v=3" />

    <!-- ── Apple PWA tags — these are what make it feel native on iOS ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RuneTrader" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png?v=3" />

    <!-- ── Splash screens for iPhone (optional but polished) ── -->
    <meta name="msapplication-TileColor" content="#0a0c0f" />

    <!-- ── Open Graph (for sharing links) ── -->
    <meta property="og:title" content="RuneTrader.gg — OSRS GE Flip Tracker" />
    <meta property="og:description" content="Find the best OSRS Grand Exchange flips with live prices and AI advice." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://runetrader.gg" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run RuneTrader.</noscript>
    <div id="root"></div>

    <!-- ── Register service worker ── -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').then(
            function (reg) { console.log('[RuneTrader] SW registered:', reg.scope); },
            function (err) { console.warn('[RuneTrader] SW failed:', err); }
          );
        });
      }
    </script>
  </body>
</html>
